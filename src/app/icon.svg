<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradient brand : violet → indigo → pink (même que hero rocket card) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="55%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Fond carré gradient violet/indigo/pink, coins arrondis -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Fusée 🚀 (icon Lucide simplifiée, rotation -45° cap nord-est) -->
  <!-- Le path est dessiné dans un viewBox 24 puis centré + tourné dans 32x32. -->
  <g transform="translate(16 16) rotate(-45) scale(0.62) translate(-12 -12)" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Corps principal de la fusée -->
    <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
    <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
    <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
    <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
  </g>
</svg>
