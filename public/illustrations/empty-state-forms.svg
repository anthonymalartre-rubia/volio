<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- Formulaire vide avec curseur qui clignote -->
  <rect x="80" y="30" width="160" height="170" rx="12" fill="#fff" stroke="#e4e4e7" stroke-width="1.4"/>
  <!-- Title row -->
  <rect x="96" y="50" width="80" height="10" rx="3" fill="#7C3AED" fill-opacity="0.20"/>
  <!-- Field 1 -->
  <rect x="96" y="78" width="128" height="28" rx="6" fill="#fafafb" stroke="#e4e4e7" stroke-width="1"/>
  <rect x="104" y="88" width="42" height="8" rx="2" fill="#d4d4d8"/>
  <!-- Field 2 -->
  <rect x="96" y="116" width="128" height="28" rx="6" fill="#fff" stroke="#7C3AED" stroke-width="1.4"/>
  <!-- Curseur clignotant violet -->
  <rect x="106" y="124" width="1.8" height="12" fill="#7C3AED">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <!-- Submit button -->
  <rect x="96" y="158" width="128" height="32" rx="8" fill="#7C3AED"/>
  <rect x="138" y="170" width="44" height="8" rx="2" fill="#fff" fill-opacity="0.8"/>
</svg>
