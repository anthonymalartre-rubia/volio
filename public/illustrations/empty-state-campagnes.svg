<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- Enveloppe qui s'envole avec trail violet -->
  <defs>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <!-- Trail -->
  <path d="M 30 170 Q 100 160 180 120 Q 220 100 240 80" stroke="url(#trail)" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="4 6"/>
  <!-- Enveloppe -->
  <g transform="translate(220,55) rotate(-15)">
    <rect x="0" y="0" width="64" height="46" rx="4" fill="#fff" stroke="#7C3AED" stroke-width="1.6"/>
    <path d="M 0 0 L 32 28 L 64 0" stroke="#7C3AED" stroke-width="1.6" fill="none"/>
    <path d="M 0 46 L 24 26 M 64 46 L 40 26" stroke="#6366F1" stroke-width="1.2"/>
  </g>
  <!-- Petites particules dans la trail -->
  <circle cx="80" cy="160" r="2" fill="#a78bfa"/>
  <circle cx="120" cy="148" r="1.6" fill="#7C3AED"/>
  <circle cx="160" cy="130" r="2" fill="#6366F1"/>
  <circle cx="195" cy="110" r="1.6" fill="#a78bfa"/>
</svg>
