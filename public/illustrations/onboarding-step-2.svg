<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- Step 2 : quel objectif — compass / boussole -->
  <g transform="translate(160,110)">
    <circle cx="0" cy="0" r="64" fill="#fff" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="0" cy="0" r="54" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="2 4"/>
    <!-- Points cardinaux -->
    <text x="0" y="-44" text-anchor="middle" font-size="12" font-weight="700" fill="#4338CA" font-family="Inter, sans-serif">N</text>
    <text x="0" y="50" text-anchor="middle" font-size="10" font-weight="600" fill="#a78bfa" font-family="Inter, sans-serif">S</text>
    <text x="-50" y="4" text-anchor="middle" font-size="10" font-weight="600" fill="#a78bfa" font-family="Inter, sans-serif">O</text>
    <text x="50" y="4" text-anchor="middle" font-size="10" font-weight="600" fill="#a78bfa" font-family="Inter, sans-serif">E</text>
    <!-- Aiguille -->
    <path d="M 0 -32 L 7 6 L 0 0 L -7 6 Z" fill="#7C3AED"/>
    <path d="M 0 32 L 5 6 L 0 0 L -5 6 Z" fill="#fff" stroke="#7C3AED" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="3" fill="#7C3AED"/>
  </g>
</svg>
