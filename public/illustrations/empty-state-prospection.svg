<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <!-- Carte de France stylisée minimaliste avec un cercle violet sur une zone -->
  <defs>
    <linearGradient id="frBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="220" fill="url(#frBg)"/>
  <!-- France abstract polygon -->
  <path d="M 130 50 L 175 48 L 200 70 L 215 95 L 220 130 L 205 160 L 175 175 L 150 170 L 130 155 L 115 130 L 110 100 Z"
        fill="#fff" stroke="#7C3AED" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Quelques marqueurs (cities) -->
  <circle cx="160" cy="80" r="2.4" fill="#a78bfa"/>
  <circle cx="195" cy="115" r="2.4" fill="#a78bfa"/>
  <circle cx="145" cy="135" r="2.4" fill="#a78bfa"/>
  <circle cx="175" cy="160" r="2.4" fill="#a78bfa"/>
  <!-- Zone active : grand cercle violet pulsant -->
  <circle cx="170" cy="115" r="28" fill="#7C3AED" fill-opacity="0.10" stroke="#7C3AED" stroke-width="1.4"/>
  <circle cx="170" cy="115" r="14" fill="#7C3AED" fill-opacity="0.20" stroke="#7C3AED" stroke-width="1.2"/>
  <circle cx="170" cy="115" r="5" fill="#7C3AED"/>
  <!-- Petite ligne label -->
  <line x1="180" y1="100" x2="220" y2="80" stroke="#6366F1" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="220" y="68" width="58" height="22" rx="6" fill="#fff" stroke="#6366F1" stroke-width="1.2"/>
  <text x="249" y="82" text-anchor="middle" font-size="10" fill="#4338CA" font-family="Inter, sans-serif" font-weight="600">+1240</text>
</svg>
